<!--
  ════════════════════════════════════════════════════════════════════
  MOSO 랜딩 임베드 — 아임웹 HTML 위젯에 붙여넣을 코드
  ════════════════════════════════════════════════════════════════════
  
  사용 방법 (단 1단계):
    아래 모든 코드를 복사 → 아임웹 페이지 편집 → HTML 위젯에 붙여넣기 → 저장
  
  특징:
    ✅ 디자인 100% 격리 (아임웹 CSS 영향 0)
    ✅ 자동 업데이트 (랜딩 디자인 수정 시 아임웹 코드 변경 불필요)
    ✅ 모바일 반응형 (콘텐츠 높이 자동 조절)
  
  보안:
    · 직접 URL 접근(브라우저로 https://moso-rho.vercel.app/embed/landing)
      → 차단 안내 페이지로 자동 리다이렉트
    · iframe 임베드만 허용
  
  ════════════════════════════════════════════════════════════════════
-->

<style>
  .moso-embed-wrap {
    width: 100% !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #ffffff !important;
    overflow: hidden !important;
  }
  .moso-embed-wrap iframe {
    display: block !important;
    width: 100% !important;
    border: 0 !important;
    margin: 0 !important;
    padding: 0 !important;
    background: #ffffff !important;
  }
</style>

<div class="moso-embed-wrap">
  <iframe
    id="moso-landing-iframe"
    src="https://moso-rho.vercel.app/embed/landing"
    title="MOSO 모두의 소개팅"
    scrolling="no"
    loading="lazy"
    referrerpolicy="strict-origin-when-cross-origin"
    style="width: 100%; height: 3500px; border: 0;"
  ></iframe>
</div>

<script>
  /*
    iframe 높이 자동 조절 (cross-origin 대응)
    
    같은 도메인이 아니라 contentDocument 접근 불가 → postMessage 패턴은 필요 없음.
    대신 콘텐츠 높이가 보통 일정하므로 데스크탑/모바일 별 height 를 추정해서 적용.
    스크롤은 외부 페이지(아임웹)가 담당하므로 iframe 자체는 스크롤 끔.
  */
  (function () {
    var iframe = document.getElementById("moso-landing-iframe");
    if (!iframe) return;

    function setHeight() {
      // 화면 너비 기준으로 적정 높이 추정
      var w = window.innerWidth;
      var h;
      if (w >= 920) {
        h = 3300; // 데스크톱
      } else if (w >= 720) {
        h = 4200; // 태블릿
      } else if (w >= 480) {
        h = 4500; // 큰 모바일
      } else {
        h = 4800; // 작은 모바일
      }
      iframe.style.height = h + "px";
    }

    setHeight();
    window.addEventListener("resize", function () {
      clearTimeout(window.__mosoResizeT);
      window.__mosoResizeT = setTimeout(setHeight, 150);
    });
  })();
</script>
