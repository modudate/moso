<!-- =========================================================
     MOSO 이용권 결제 페이지 상단 섹션
     아임웹 HTML 위젯에 그대로 붙여넣기
     ========================================================= -->
<div class="moso-shop-top" style="display:block !important; width:100% !important; margin:0 !important; padding:0 !important; font-family:'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif !important; color:#111827 !important;">
  <style>
    .moso-shop-top,
    .moso-shop-top * {
      box-sizing: border-box !important;
    }
    .moso-shop-top a {
      text-decoration: none !important;
    }
    .moso-shop-wrap {
      width: 100% !important;
      background: linear-gradient(180deg, #fff8f1 0%, #ffffff 100%) !important;
      padding: 52px 24px 48px !important;
      overflow: hidden !important;
      position: relative !important;
    }
    .moso-shop-wrap::before {
      content: "" !important;
      position: absolute !important;
      right: -120px !important;
      top: -120px !important;
      width: 360px !important;
      height: 360px !important;
      border-radius: 999px !important;
      background: radial-gradient(circle, rgba(255, 138, 61, 0.18) 0%, rgba(255, 138, 61, 0) 68%) !important;
      pointer-events: none !important;
    }
    .moso-shop-inner {
      max-width: 760px !important;
      margin: 0 auto !important;
      display: block !important;
      text-align: center !important;
      position: relative !important;
      z-index: 1 !important;
    }
    .moso-shop-eyebrow {
      display: inline-flex !important;
      align-items: center !important;
      gap: 8px !important;
      padding: 7px 16px !important;
      background: #ffffff !important;
      color: #f06a1f !important;
      border: 1px solid #ffe0c8 !important;
      border-radius: 999px !important;
      font-size: 13px !important;
      font-weight: 800 !important;
      letter-spacing: 0.5px !important;
    }
    .moso-shop-dot {
      width: 6px !important;
      height: 6px !important;
      border-radius: 999px !important;
      background: #f06a1f !important;
      display: inline-block !important;
    }
    .moso-shop-title {
      display: block !important;
      margin: 28px 0 24px !important;
      font-size: 44px !important;
      line-height: 1.18 !important;
      letter-spacing: -1.4px !important;
      font-weight: 900 !important;
      color: #111827 !important;
    }
    .moso-shop-title span {
      color: #f06a1f !important;
    }
    .moso-shop-desc {
      display: block !important;
      max-width: 520px !important;
      margin: 0 0 34px !important;
      font-size: 16px !important;
      line-height: 1.62 !important;
      color: #374151 !important;
      font-weight: 400 !important;
    }
    .moso-shop-points {
      display: flex !important;
      flex-wrap: wrap !important;
      gap: 12px !important;
      margin-top: 34px !important;
    }
    .moso-shop-point {
      display: inline-flex !important;
      align-items: center !important;
      gap: 7px !important;
      padding: 9px 14px !important;
      border-radius: 999px !important;
      background: #ffffff !important;
      border: 1px solid #f3e6d8 !important;
      color: #374151 !important;
      font-size: 13px !important;
      font-weight: 700 !important;
      box-shadow: 0 4px 14px rgba(17, 24, 39, 0.04) !important;
    }
    .moso-shop-point svg {
      width: 15px !important;
      height: 15px !important;
      color: #f06a1f !important;
      flex-shrink: 0 !important;
    }
    @media (max-width: 720px) {
      .moso-shop-wrap {
        padding: 40px 16px 36px !important;
      }
      .moso-shop-title {
        font-size: 30px !important;
        letter-spacing: -0.6px !important;
      }
      .moso-shop-desc {
        font-size: 15px !important;
      }
      .moso-shop-points {
        flex-direction: column !important;
        align-items: center !important;
      }
    }
  </style>

  <div class="moso-shop-wrap">
    <div class="moso-shop-inner">
      <span class="moso-shop-eyebrow">
        <span class="moso-shop-dot"></span>
        MOSO 이용권
      </span>
      <p class="moso-shop-title" style="margin: 20px 0 16px !important; line-height: 1.18 !important;">
        마음에 드는 분에게<br />
        <span>진심을 전하는 이용권</span>
      </p>
      <p class="moso-shop-desc" style="margin: 0 auto 28px !important; line-height: 1.62 !important; text-align: center !important; max-width: 560px !important;">
        이용권은 단순 결제가 아니라, 검수된 회원에게 매칭 요청을 보내고<br>
        운영진의 안내를 받기 위한 시작 단계입니다.
      </p>

      <div class="moso-shop-points" style="margin-top: 24px !important; justify-content: center !important;">
        <div class="moso-shop-point">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
          </svg>
          검수 회원 대상
        </div>
        <div class="moso-shop-point">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" />
          </svg>
          직접 선택
        </div>
        <div class="moso-shop-point">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12.76c0 1.6 1.123 2.994 2.707 3.227 1.087.16 2.185.283 3.293.369V21l4.184-4.183a1.14 1.14 0 0 1 .778-.332 48.294 48.294 0 0 0 5.83-.498c1.585-.233 2.708-1.626 2.708-3.228V6.741c0-1.602-1.123-2.995-2.707-3.228A48.394 48.394 0 0 0 12 3c-2.392 0-4.744.175-7.043.513C3.373 3.746 2.25 5.14 2.25 6.741v6.019Z" />
          </svg>
          운영진 연결
        </div>
      </div>
    </div>
  </div>
</div>
